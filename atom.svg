<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240">
  <rect width="300" height="240" fill="#f3edfb"/>
  <g transform="translate(150,120)">
    <!-- orbits -->
    <ellipse rx="100" ry="38" fill="none" stroke="#6a3fa0" stroke-width="3"/>
    <ellipse rx="100" ry="38" fill="none" stroke="#6a3fa0" stroke-width="3" transform="rotate(60)"/>
    <ellipse rx="100" ry="38" fill="none" stroke="#6a3fa0" stroke-width="3" transform="rotate(120)"/>
    <!-- electrons -->
    <circle cx="100" cy="0" r="8" fill="#e74c3c"/>
    <circle cx="-50" cy="86" r="8" fill="#e74c3c" transform="rotate(60)"/>
    <circle cx="-50" cy="-86" r="8" fill="#e74c3c" transform="rotate(120)"/>
    <!-- nucleus -->
    <circle r="22" fill="#3d1a5b"/>
    <circle cx="-7" cy="-5" r="6" fill="#9b59b6"/>
    <circle cx="8" cy="3" r="6" fill="#9b59b6"/>
    <circle cx="0" cy="9" r="6" fill="#c39bd3"/>
  </g>
</svg>

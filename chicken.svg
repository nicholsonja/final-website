<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240">
  <rect width="300" height="240" fill="#fffaf0"/>
  <!-- road -->
  <rect x="0" y="180" width="300" height="60" fill="#555"/>
  <rect x="20" y="207" width="40" height="6" fill="#ffd83d"/>
  <rect x="90" y="207" width="40" height="6" fill="#ffd83d"/>
  <rect x="160" y="207" width="40" height="6" fill="#ffd83d"/>
  <rect x="230" y="207" width="40" height="6" fill="#ffd83d"/>
  <!-- body -->
  <ellipse cx="150" cy="130" rx="55" ry="45" fill="#ffffff" stroke="#333" stroke-width="3"/>
  <!-- head -->
  <circle cx="195" cy="95" r="28" fill="#ffffff" stroke="#333" stroke-width="3"/>
  <!-- comb -->
  <path d="M183 70 q6 -14 12 0 q6 -14 12 0 v8 h-24 z" fill="#e74c3c"/>
  <!-- beak -->
  <polygon points="222,95 245,90 222,103" fill="#f5a623"/>
  <!-- wattle -->
  <ellipse cx="210" cy="112" rx="5" ry="9" fill="#e74c3c"/>
  <!-- eye -->
  <circle cx="200" cy="90" r="4" fill="#333"/>
  <!-- legs -->
  <line x1="135" y1="173" x2="135" y2="195" stroke="#f5a623" stroke-width="4"/>
  <line x1="165" y1="173" x2="165" y2="195" stroke="#f5a623" stroke-width="4"/>
  <!-- tail -->
  <path d="M95 120 q-30 -10 -35 -35 q25 10 40 20 z" fill="#ffffff" stroke="#333" stroke-width="3"/>
</svg>
